# Origin Monitor — Nginx config
# - originmonitor.com / www → Next.js portal on :3000
# - api.originmonitor.com    → Node.js API on :4000

# ---------- Portal ----------
server {
    server_name originmonitor.com www.originmonitor.com;

    # Large enough for sensor reading batches / file uploads later
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/originmonitor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/originmonitor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---------- API ----------
server {
    server_name api.originmonitor.com;

    client_max_body_size 2M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/originmonitor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/originmonitor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---------- HTTP → HTTPS redirects ----------
server {
    if ($host = www.originmonitor.com) { return 301 https://$host$request_uri; }
    if ($host = originmonitor.com)     { return 301 https://$host$request_uri; }

    listen 80;
    listen [::]:80;
    server_name originmonitor.com www.originmonitor.com;
    return 404;
}

server {
    if ($host = api.originmonitor.com) { return 301 https://$host$request_uri; }

    listen 80;
    listen [::]:80;
    server_name api.originmonitor.com;
    return 404;
}
